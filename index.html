<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css">
<link href="https:/..." rel="stylesheet">
</head>

<body>
<div class="editor-column">

<label>ARCHIVE TITLE</label>
<input type="text" id="mainTitleInput">

<label>SUB TITLE</label>
<input type="text" id="subTitleInput">

<label>DESCRIPTION</label>
<textarea id="mainDescInput"></textarea>

<label>PROJECT NUMBER</label>
<input type="text" id="projectNumberInput">

<label>PROJECT LABEL</label>
<input type="text" id="projectLabelInput">

<label>ARCHIVE LABEL</label>
<input type="text" id="archiveLabelInput">

<label>SUB DESCRIPTION</label>
<input type="text" id="subDescInput">

<label>PROJECT TEXT</label>
<input type="text" id="projectTextInput">

</div>
<div class="cursor-glow"></div>

<div class="bg-gradient one"></div>
<div class="bg-gradient two"></div>


<div class="toolbar">

<input type="color" id="themeColor" value="#8b5cf6">

<input type="file" id="imageUpload" accept="image/png,image/jpeg">

<button onclick="saveProfile()">
저장
</button>

<button onclick="loadProfile()">
불러오기
</button>

<button onclick="savePNG()">
PNG 저장
</button>

<button onclick="saveHTML()">
HTML 저장
</button>

<input
type="file"
id="loadFile"
accept=".json"
style="display:none">

</div>

<div id="card" class="card">

<img
id="avatar"
src="default.png"
class="avatar">

<h1
contenteditable="true"
id="name">
캐릭터 이름
</h1>

<p
contenteditable="true"
id="title">
직업 / 종족
</p>

<div
contenteditable="true"
id="description">

캐릭터 소개를 입력하세요.

</div>

</div>

</body>
</html>
