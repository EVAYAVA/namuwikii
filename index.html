<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Profile</title>

<link rel="stylesheet" href="style.css">
<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
<link rel="stylesheet" href="style.css">
<link href="https:/..." rel="stylesheet">
</head>

<body>
<div class="editor-column">

<label>ARCHIVE TITLE</label>
<input type="text" id="mainTitleInput">

<label>SUB TITLE</label>
<input type="text" id="subTitleInput">

<label>DESCRIPTION</label>
<textarea id="mainDescInput"></textarea>

<label>PROJECT NUMBER</label>
<input type="text" id="projectNumberInput">

<label>PROJECT LABEL</label>
<input type="text" id="projectLabelInput">

<label>ARCHIVE LABEL</label>
<input type="text" id="archiveLabelInput">

<label>SUB DESCRIPTION</label>
<input type="text" id="subDescInput">

<label>PROJECT TEXT</label>
<input type="text" id="projectTextInput">

</div>
<div class="cursor-glow"></div>

<div class="bg-gradient one"></div>
<div class="bg-gradient two"></div>

<main id="captureArea">

<section class="hero">

<div class="avatar">
<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43">
</div>

<div>
<p class="tag">AVAILABLE FOR WORK</p>

<h1 contenteditable="true">
Creative<br>
Developer
</h1>

<p class="description" contenteditable="true">
디자인과 개발을 연결하는
디지털 크리에이터.
</p>
</div>

</section>

<section class="grid">

<div class="card large">
<h2 contenteditable="true">About Me</h2>

<p contenteditable="true">
자기소개를 입력하세요.
</p>
</div>

<div class="card">
<h2>Skills</h2>

<ul contenteditable="true">
<li>HTML</li>
<li>CSS</li>
<li>JavaScript</li>
<li>React</li>
</ul>
</div>

<div class="card">
<h2>Contact</h2>

<p contenteditable="true">
hello@email.com
</p>
</div>

<div class="card">
<h2>Location</h2>

<p contenteditable="true">
Seoul, Korea
</p>
</div>

</section>

<div class="buttons">

<button onclick="saveHTML()">
Save HTML
</button>

<button onclick="saveScreen()">
Save Screen
</button>

</div>

</main>

<script src="script.js"></script>

</body>
</html>
